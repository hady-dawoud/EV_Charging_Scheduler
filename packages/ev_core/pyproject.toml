[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "ev-core"
version = "0.1.0"
description = "Standalone EV-side core scaffolding for data, forecasting, and simulation."
readme = "README.md"
requires-python = ">=3.9"
dependencies = [
  "pandas>=2.0",
  "numpy>=1.24",
  "pydantic>=2.0,<3.0",
  "pyyaml>=6.0",
  "pyarrow>=12.0",
  "jupyter>=1.0",
  "ipykernel>=6.0",
  "matplotlib>=3.7",
  "scikit-learn>=1.3",
  "pytest>=8.0",
  "ruff>=0.4",
]

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]

[tool.ruff]
line-length = 100
target-version = "py39"
