services:
  postgres:
    image: postgres:16
    container_name: ev_postgres
    environment:
      POSTGRES_DB: ev_smart_charging
      POSTGRES_USER: ev_user
      POSTGRES_PASSWORD: change_me
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ev_user -d ev_smart_charging"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  runtime:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: ev_runtime
    working_dir: /app
    command: >
      python -m services.sim_runtime.main start
      --day 2024-06-10
      --hour 14
      --minute 0
      --policy overload_aware
      --mode hybrid
      --preset busy_afternoon
      --warm-start-hours 2
      --loop
      --interval-seconds 2
    volumes:
      - ./outputs/runtime:/app/outputs/runtime
      - ./data:/app/data
    environment:
      - PYTHONPATH=/app:/app/packages/ev_core/src
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: ev_api
    ports:
      - "8000:8000"
    volumes:
      - ./outputs/runtime:/app/outputs/runtime
      - ./data:/app/data
    environment:
      - PYTHONPATH=/app:/app/packages/ev_core/src
      - CORS_ORIGINS=http://20.216.14.193:3000,http://localhost:3000
      - DATABASE_URL=postgresql+psycopg://ev_user:change_me@postgres:5432/ev_smart_charging
      - RECOMMENDATION_POLICY_NAME=weighted_score
      - DYNAMIC_PRICING_ENABLED=true
      - ROUTING_PROVIDER_NAME=simple_distance
      - OSMNX_GRAPH_PATH=data/processed/routing/dundee_drive.graphml
    depends_on:
      postgres:
        condition: service_healthy
      runtime:
        condition: service_started
    restart: unless-stopped

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    container_name: ev_dashboard
    ports:
      - "8501:8501"
    volumes:
      - ./outputs/runtime:/app/outputs/runtime
      - ./data:/app/data
    environment:
      - PYTHONPATH=/app:/app/packages/ev_core/src
    depends_on:
      - runtime
    restart: unless-stopped

  mobile:
    build:
      context: .
      dockerfile: Dockerfile.mobile
      args:
        EXPO_PUBLIC_API_BASE_URL: http://smartevcharging.uaenorth.cloudapp.azure.com/api
    container_name: ev_mobile
    ports:
      - "3000:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres_data:
